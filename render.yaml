services:
  # Frontend Static Site
  - type: web
    name: ticketing-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: bun install && bun run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: ticketing-backend
          type: web
          property: host
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /.*
        destination: /index.html
    autoDeploy: true

  # Backend Web Service
  - type: web
    name: ticketing-backend
    runtime: node
    rootDir: Backend
    buildCommand: bun install && bun run build
    startCommand: ./server
    disk:
      name: ticketing-uploads-storage
      mountPath: /opt/render/project/src/uploads
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticketing-db
          property: connectionString
      - key: FRONTEND_URL
        fromService:
          name: ticketing-frontend
          type: web
          property: host
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    autoDeploy: true

databases:
  - name: ticketing-db
    plan: free
