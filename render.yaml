services:
  # Frontend Static Site
  - type: web
    name: ticketing-frontend
    runtime: static
    rootDir: Frontend
    buildCommand: bun install && bun run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        # Using the full public URL because static sites cannot resolve internal hosts
        value: https://ticketing-backend-ysq5.onrender.com
      - key: NODE_ENV
        value: production
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    autoDeploy: true

  # Backend Web Service
  - type: web
    name: ticketing-backend
    runtime: node
    plan: free
    rootDir: Backend
    buildCommand: bun install && bun run build
    # Free tier does not support preDeployCommand, so we migrate and seed in startCommand
    startCommand: bun run migrate:deploy && bun run db:seed && ./server
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ticketing-db
          property: connectionString
      - key: FRONTEND_URL
        # Using the full public URL for CORS matching
        value: https://ticketing-frontend-j23v.onrender.com
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    autoDeploy: true

databases:
  - name: ticketing-db
    plan: free
